ancestor: null
releases:
  1.0.0:
    changes:
      release_summary:
        "This is the first proper release of ``nils_ost.bambuddy``
        collection on 2026-02-11.

        This release contains everything I need to setup my BamBuddy instance for
        what I like to use it."
    fragments:
      - v1.0.0.yml
    modules:
      - description: lists all elements.
        name: list
        namespace: ""
      - description: manage printer.
        name: printer
        namespace: ""
      - description: configure common settings.
        name: settings
        namespace: ""
      - description: executes initial setup.
        name: setup
        namespace: ""
      - description: fetch bambuddy API token (login).
        name: token
        namespace: ""
      - description: enable or disable virtual\_printer feature.
        name: virtual_printer
        namespace: ""
    objects:
      role:
        - description: configures basic BamBuddy capabilities.
          name: basic_config
          namespace: null
        - description: installs BamBuddy within docker.
          name: install_with_docker
          namespace: null
    release_date: "2026-02-11"
  1.1.0:
    changes:
      bugfixes:
        - some modules used exit_json in places where fail_json should be called
      minor_changes:
        - by adding parameters 'remote_interface_ip' and 'target_printer_name' all features
          of virtual_printer are now usable
        - virtual_printer certificate is shown to be injected to slicer configuration
        - virtual_printer ports are properly forwared for docker installations done
          by this collection
      release_summary:
        "Improvements regarding the virtual_printer -- it now works
        out-of-the box

        "
    fragments:
      - v1.1.0.yml
    release_date: "2026-02-22"
